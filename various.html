        <img src="img/varios/varios-14.webp" alt="Generative AI" loading="lazy" />

      </div>
      <div class="mosaic-item col-2" data-title="Generative AI">
        <img src="img/varios/varios-16.webp" alt="Generative AI" loading="lazy" />

  <div class="gallery-modal" id="gallery-modal" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="modal-close-btn" id="modal-close" aria-label="Close">&#x2715;</button>
    <button class="modal-nav-btn prev" id="modal-prev" aria-label="Previous">&#8592;</button>
    <img id="modal-img" src="" alt="" />
    <p class="modal-caption" id="modal-caption"></p>
    <button class="modal-nav-btn next" id="modal-next" aria-label="Next">&#8594;</button>
  </div>

  <script>
    const header = document.getElementById('site-header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    const items = Array.from(document.querySelectorAll('.mosaic-item'));
    const modal = document.getElementById('gallery-modal');
    const modalImg = document.getElementById('modal-img');
    const modalCaption = document.getElementById('modal-caption');
    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      const item = items[index];
      const img = item.querySelector('img');
      modalImg.src = img.src;
      modalImg.alt = img.alt;
      modalCaption.textContent = item.dataset.title;
      modal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + items.length) % items.length;
      const item = items[currentIndex];
      const img = item.querySelector('img');
      modalImg.src = img.src;
      modalImg.alt = img.alt;
      modalCaption.textContent = item.dataset.title;
    }

    items.forEach((item, i) => item.addEventListener('click', () => openModal(i)));

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-prev').addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });
    document.getElementById('modal-next').addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });

    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target === modalCaption) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('is-open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>
