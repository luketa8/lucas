<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="alternate icon" type="image/png" href="img/favicon-32.png" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Lucas Speyer — Senior Product Designer" />
  <meta property="og:description" content="Senior Product Designer with 12+ years shaping digital products and design systems. Based in Buenos Aires, Argentina." />
  <meta property="og:image" content="https://lucas.github.io/img/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://lucas.github.io/img/og-image.png" />
  <script>
    // If already authenticated, redirect to portfolio
    if (sessionStorage.getItem('auth')) {
      // Will verify on portfolio.html side; just redirect
      window.location.replace('portfolio.html');
    }
  </script>
</head>
<body>
  <div class="password-page">
    <div class="password-box">
      <p class="site-name">Lucas&nbsp;— Portfolio</p>
      <form class="password-form" id="login-form">
        <input
          type="password"
          id="password-input"
          placeholder="Password"
          autocomplete="current-password"
          required
          autofocus
        />
        <button type="submit">Enter</button>
        <p class="error-msg" id="error-msg" aria-live="polite">Incorrect password</p>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
